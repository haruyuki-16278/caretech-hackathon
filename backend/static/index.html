<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おはなしの部屋</title>
<style>
  :root {
    --color-paper: #faf6ef;
    --color-ink: #3a3129;
    --color-accent: #b3541e;
    --color-me: #e8f0dc;
    --color-ai: #ffffff;
    --color-consult: #fdf0e5;
    --text-base: clamp(1.25rem, 1rem + 1vw, 1.6rem);
    --radius: 20px;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", sans-serif;
    background: var(--color-paper);
    color: var(--color-ink);
    font-size: var(--text-base);
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header {
    padding: 0.8rem 1.2rem;
    background: var(--color-ink);
    color: var(--color-paper);
    display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  }
  header h1 { font-size: 1.2em; letter-spacing: 0.15em; }
  header .links a { color: var(--color-paper); font-size: 0.75em; }
  .settings {
    padding: 0.6rem 1.2rem; display: flex; gap: 1rem; align-items: center;
    background: #f0e8da; font-size: 0.8em; flex-wrap: wrap;
  }
  .settings label { display: flex; gap: 0.4rem; align-items: center; }
  select, input[type=text] {
    font-size: 1em; padding: 0.3rem 0.5rem; border-radius: 8px;
    border: 2px solid var(--color-ink); background: #fff;
  }
  main { flex: 1; overflow-y: auto; padding: 1.2rem; display: flex; flex-direction: column; gap: 1rem; }
  .msg { max-width: 85%; padding: 0.9rem 1.2rem; border-radius: var(--radius); line-height: 1.7;
         box-shadow: 0 2px 6px rgba(58, 49, 41, 0.12); }
  .msg.me { align-self: flex-end; background: var(--color-me); border-bottom-right-radius: 4px; }
  .msg.ai { align-self: flex-start; background: var(--color-ai); border-bottom-left-radius: 4px; }
  .consult-card {
    align-self: flex-start; max-width: 85%;
    background: var(--color-consult); border: 3px solid var(--color-accent);
    border-radius: var(--radius); padding: 1rem 1.2rem;
  }
  .consult-card h2 { font-size: 0.9em; color: var(--color-accent); margin-bottom: 0.4rem; }
  .consult-card .phone { font-size: 1.5em; font-weight: bold; letter-spacing: 0.05em; }
  .consult-card p { font-size: 0.8em; line-height: 1.6; }
  .badge { display: inline-block; font-size: 0.6em; padding: 0.1em 0.7em; border-radius: 999px;
           background: var(--color-accent); color: #fff; vertical-align: middle; margin-left: 0.5em; }
  footer { padding: 1rem 1.2rem 1.4rem; background: #f0e8da; display: flex; gap: 0.8rem; }
  #input { flex: 1; font-size: 1em; padding: 0.8rem 1rem; border-radius: 14px;
           border: 2px solid var(--color-ink); }
  button {
    font-size: 1em; padding: 0.8rem 1.4rem; border-radius: 14px; border: none;
    background: var(--color-accent); color: #fff; cursor: pointer; font-family: inherit;
    transition: transform 120ms ease, opacity 120ms ease;
  }
  button:hover { opacity: 0.88; }
  button:active { transform: scale(0.96); }
  button.mic.recording { background: #c0392b; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.6; } }
  .starters {
    display: flex; gap: 0.8rem; flex-wrap: wrap;
    padding: 0 1.2rem 0.8rem; background: transparent;
  }
  .starters.hidden { display: none; }
  .starter {
    background: #fff; color: var(--color-ink);
    border: 3px solid var(--color-accent); border-radius: 999px;
    padding: 0.7rem 1.4rem; font-size: 0.95em;
    box-shadow: 0 2px 6px rgba(58, 49, 41, 0.12);
  }
  .starter:hover { background: var(--color-consult); opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>おはなしの部屋</h1>
  <nav class="links"><a href="/feed.html">みんなの広場を見る →</a></nav>
</header>

<div class="settings">
  <label>お名前 <input type="text" id="name" value="たろうじいちゃん" size="10"></label>
  <label>お住まい
    <select id="area">
      <option>あわら</option><option>三国</option><option>丸岡</option>
      <option>春江</option><option selected>坂井</option>
    </select>
  </label>
</div>

<main id="log" aria-live="polite">
  <div class="msg ai">こんにちは。今日はどんなお話をしましょうか?最近あったこと、昔の思い出、困っていること、なんでもお聞かせください。</div>
</main>

<div class="starters" id="starters" aria-label="話題を選ぶ">
  <button class="starter" data-text="昔の思い出話を聞いてほしいんじゃ">📖 思い出話をする</button>
  <button class="starter" data-text="ちょっと困っていることがあってなあ">🍵 困っていることを相談</button>
</div>

<footer>
  <input id="input" type="text" placeholder="ここに話しかけてください" aria-label="メッセージ入力">
  <button class="mic" id="mic" title="音声入力">🎤</button>
  <button id="send">話す</button>
</footer>

<script>
const sessionId = "s-" + Math.random().toString(36).slice(2);
const log = document.getElementById("log");
const input = document.getElementById("input");

function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function addConsultCard(info) {
  const card = document.createElement("div");
  card.className = "consult-card";
  card.innerHTML = `
    <h2>ご相談はこちらへ</h2>
    <div><strong>${info.office}</strong></div>
    <div class="phone">☎ ${info.phone}</div>
    <p>${info.address ?? ""}<br>${info.field}</p>`;
  log.appendChild(card);
  log.scrollTop = log.scrollHeight;
}

let sending = false;

function setSending(state) {
  sending = state;
  sendBtn.disabled = state;
  sendBtn.textContent = state ? "…" : "話す";
}

async function send() {
  const text = input.value.trim();
  if (!text || sending) return;  // 応答が返るまで連続送信しない
  setSending(true);
  document.getElementById("starters").classList.add("hidden");
  input.value = "";  // 送信した内容は入力欄から消す
  addMsg(text, "me");
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        session_id: sessionId,
        user_id: "demo-user-1",
        text,
        area: document.getElementById("area").value,
        display_name: document.getElementById("name").value || "名無しさん",
      }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const div = addMsg(data.reply, "ai");
    if (data.posted) {
      div.insertAdjacentHTML("beforeend", '<span class="badge">投稿しました</span>');
    }
    if (data.consult_info) addConsultCard(data.consult_info);
  } catch (e) {
    addMsg("すみません、うまくつながりませんでした。もう一度お試しください。", "ai");
    console.error(e);
  } finally {
    setSending(false);
    input.focus();
  }
}

const sendBtn = document.getElementById("send");
sendBtn.addEventListener("click", send);

// 最初に表示する話題ボタン。押すとその話題で会話を始め、以降は非表示にする
const starters = document.getElementById("starters");
starters.querySelectorAll(".starter").forEach((btn) => {
  btn.addEventListener("click", () => {
    input.value = btn.dataset.text;
    send();
  });
});
input.addEventListener("keydown", (e) => {
  // 日本語入力の変換確定Enter(isComposing / keyCode 229)では送信しない。
  // 確定後にもう一度Enterを押したときだけ送信する。
  if (e.key === "Enter" && !e.isComposing && e.keyCode !== 229) send();
});

// 音声入力(Web Speech API)。文字起こし担当(A)の実装が入るまでの暫定
const mic = document.getElementById("mic");
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR();
  rec.lang = "ja-JP";
  rec.interimResults = false;
  let recording = false;
  mic.addEventListener("click", () => {
    if (recording) { rec.stop(); return; }
    rec.start();
    recording = true;
    mic.classList.add("recording");
  });
  rec.addEventListener("result", (e) => { input.value = e.results[0][0].transcript; });
  rec.addEventListener("end", () => {
    recording = false;
    mic.classList.remove("recording");
    if (input.value.trim()) send();
  });
} else {
  mic.style.display = "none";
}
</script>
</body>
</html>
